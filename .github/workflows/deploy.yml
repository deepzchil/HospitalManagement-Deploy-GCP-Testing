name: CI/CD Pipeline with Manager Approval

on:
  push:
    branches: [main]

jobs:

  build:
    name: Build Website Package
    runs-on: ubuntu-latest

    outputs:
      image: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hospital-repo/hospital-app:latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Packages
        run: dotnet restore

      - name: Build Application
        run: dotnet build --configuration Release --no-restore

      - name: Publish Application
        run: dotnet publish -c Release -o publish

      - name: Authenticate GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build Docker Image
        run: |
          docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hospital-repo/hospital-app:latest .

      - name: Push Docker Image
        run: |
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hospital-repo/hospital-app:latest

  approval-email:
    name: Send Approval Email
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Approval Required - Production Deployment
          to: ${{ secrets.MANAGER_EMAIL }}
          from: DevOps Pipeline
          html_body: |
            <html>
            <body style="font-family:Arial;background:#f5f5f5;padding:20px;">
              <div style="background:white;padding:25px;border-radius:10px;">
                <h2 style="color:#0d6efd;">Deployment Approval Needed</h2>
                <p>Build completed successfully.</p>
                <table style="width:100%;border-collapse:collapse;">
                  <tr style="background:#0d6efd;color:white;">
                    <th style="padding:10px;">Application</th>
                    <th style="padding:10px;">Environment</th>
                  </tr>
                  <tr>
                    <td style="padding:10px;border:1px solid #ddd;">Hospital App</td>
                    <td style="padding:10px;border:1px solid #ddd;">Production</td>
                  </tr>
                </table>
                <p style="margin-top:20px;">Please approve deployment in GitHub Actions.</p>
              </div>
            </body>
            </html>

  approval:
    name: Production Approval
    runs-on: ubuntu-latest
    needs: approval-email
    environment:
      name: production

    steps:
      - name: Waiting for Approval
        run: echo "Waiting for manager approval"

  deploy:
    name: Deploy to GCP Cloud Run Production
    runs-on: ubuntu-latest
    needs: approval

    steps:
      - name: Authenticate GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Application
        run: |
          gcloud run deploy hospital-app \
          --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hospital-repo/hospital-app:latest \
          --region us-central1 \
          --platform managed \
          --allow-unauthenticated \
          --port 8080 \
          --timeout 300

  success-email:
    name: Send Success Email
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Send Success Mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Deployment Successful
          to: ${{ secrets.MANAGER_EMAIL }}
          from: DevOps Pipeline
          html_body: |
            <html>
            <body style="font-family:Arial;background:#f5f5f5;padding:20px;">
              <div style="background:white;padding:25px;border-radius:10px;">
                <h2 style="color:#198754;">Deployment Successful</h2>
                <table style="width:100%;border-collapse:collapse;">
                  <tr style="background:#198754;color:white;">
                    <th style="padding:10px;">Application</th>
                    <th style="padding:10px;">Status</th>
                  </tr>
                  <tr>
                    <td style="padding:10px;border:1px solid #ddd;">Hospital App</td>
                    <td style="padding:10px;border:1px solid #ddd;">Live in Production</td>
                  </tr>
                </table>
              </div>
            </body>
            </html>