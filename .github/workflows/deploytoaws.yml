name: CI/CD Pipeline with Change Report + Manager Approval (AWS)

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  S3_BUCKET_NAME: hospital-app-deploy-bucket
  APPLICATION_NAME: hospital-app
  DEPLOYMENT_GROUP: hospital-app-group
  DOTNET_VERSION: 8.0.x
  MANAGER_EMAIL: ${{ vars.MANAGER_EMAIL }}
  MANAGER_NAME: ${{ vars.MANAGER_NAME }}

permissions:
  contents: read
  actions: read
  id-token: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:

# -------------------------------------------------
# JOB 1 - BUILD + CHANGE SUMMARY
# -------------------------------------------------
  build:
    name: Build Website Package
    runs-on: ubuntu-latest

    outputs:
      changed_files: ${{ steps.diff.outputs.changed_files }}
      commit_message: ${{ steps.commit.outputs.commit_message }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Read Commit Message
        id: commit
        shell: bash
        run: |
          echo "commit_message<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Detect Changed Files
        id: diff
        shell: bash
        run: |
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          git diff --name-only HEAD~1 HEAD >> $GITHUB_OUTPUT || true
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish --configuration Release --no-build -o publish

      - name: Create Deployment Zip
        run: |
          cd publish
          zip -r ../deployment.zip .

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-package
          path: deployment.zip

# -------------------------------------------------
# JOB 2 - SEND APPROVAL EMAIL
# -------------------------------------------------
  approval-mail:
    name: Send Approval Email
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Send Approval Mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Production Deployment Approval Required | ${{ github.repository }}
          to: ${{ env.MANAGER_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}
          html_body: |
            <html>
            <body style="font-family:Arial;color:#333;">
              <h2 style="color:#FF9900;">Dear ${{ env.MANAGER_NAME }},</h2>
              <p>
                Latest build for <b>${{ github.repository }}</b> completed successfully
                and is ready for production approval.
              </p>

              <h3>Deployment Summary</h3>
              <table border="1" cellpadding="8" cellspacing="0" style="border-collapse:collapse;width:100%;">
                <tr><td><b>Repository</b></td><td>${{ github.repository }}</td></tr>
                <tr><td><b>Branch</b></td><td>${{ github.ref_name }}</td></tr>
                <tr><td><b>Status</b></td><td style="color:green;"><b>SUCCESS</b></td></tr>
                <tr><td><b>Triggered By</b></td><td>${{ github.actor }}</td></tr>
                <tr><td><b>Commit ID</b></td><td>${{ github.sha }}</td></tr>
                <tr><td><b>Commit Message</b></td><td>${{ needs.build.outputs.commit_message }}</td></tr>
              </table>

              <br>

              <h3>Changes Included</h3>
              <pre style="background:#f4f4f4;padding:10px;">${{ needs.build.outputs.changed_files }}</pre>

              <p>Approve deployment in GitHub Actions.</p>

              <p>Regards,<br><b>DevOps Automation Team</b></p>
            </body>
            </html>

# -------------------------------------------------
# JOB 3 - MANUAL APPROVAL
# -------------------------------------------------
  approval:
    name: Production Approval
    needs: approval-mail
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - name: Await Approval
        run: echo "Waiting for manager approval"

# -------------------------------------------------
# JOB 4 - DEPLOY TO AWS
# -------------------------------------------------
  deploy:
    name: Deploy to AWS Production
    needs: approval
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: website-package

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload Package to S3
        run: |
          aws s3 cp deployment.zip s3://${{ env.S3_BUCKET_NAME }}/deployment.zip

      - name: Deploy using CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name ${{ env.APPLICATION_NAME }} \
            --deployment-group-name ${{ env.DEPLOYMENT_GROUP }} \
            --s3-location bucket=${{ env.S3_BUCKET_NAME }},bundleType=zip,key=deployment.zip

# -------------------------------------------------
# JOB 5 - SUCCESS EMAIL
# -------------------------------------------------
  success-mail:
    name: Send Success Email
    needs:
      - deploy
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Send Success Mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Production Deployment Successful | ${{ github.repository }}
          to: ${{ env.MANAGER_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}
          html_body: |
            <html>
            <body style="font-family:Arial;color:#333;">
              <h2 style="color:#28a745;">Deployment Successful</h2>

              <p>Dear <b>${{ env.MANAGER_NAME }}</b>,</p>

              <p>
                Approved deployment for <b>${{ github.repository }}</b>
                has been completed successfully on AWS.
              </p>

              <h3>Deployment Overview</h3>
              <table border="1" cellpadding="8" cellspacing="0" style="border-collapse:collapse;width:100%;">
                <tr><td><b>Application</b></td><td>${{ github.repository }}</td></tr>
                <tr><td><b>Branch</b></td><td>${{ github.ref_name }}</td></tr>
                <tr><td><b>Status</b></td><td style="color:green;"><b>SUCCESSFUL</b></td></tr>
                <tr><td><b>Executed By</b></td><td>${{ github.actor }}</td></tr>
                <tr><td><b>Commit ID</b></td><td>${{ github.sha }}</td></tr>
                <tr><td><b>Commit Message</b></td><td>${{ needs.build.outputs.commit_message }}</td></tr>
              </table>

              <br>

              <h3>Released Changes</h3>
              <pre style="background:#f8f9fa;padding:10px;">${{ needs.build.outputs.changed_files }}</pre>

              <p>
                AWS Production environment is now live.
              </p>

              <p>Regards,<br><b>DevOps Automation Team</b></p>
            </body>
            </html>